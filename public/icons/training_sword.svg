<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Wooden blade -->
  <rect x="28" y="8" width="8" height="36" fill="#8B6F47" stroke="#5D4E37" stroke-width="1"/>
  <!-- Slight taper at tip -->
  <polygon points="28,8 32,4 36,8" fill="#8B6F47" stroke="#5D4E37" stroke-width="1"/>
  
  <!-- Cross guard -->
  <rect x="20" y="42" width="24" height="4" rx="1" fill="#A0826D" stroke="#5D4E37" stroke-width="1"/>
  
  <!-- Handle/grip -->
  <rect x="29" y="46" width="6" height="10" fill="#6B5344" stroke="#4A3728" stroke-width="1"/>
  
  <!-- Pommel -->
  <ellipse cx="32" cy="58" rx="4" ry="3" fill="#8B6F47" stroke="#5D4E37" stroke-width="1"/>
  
  <!-- Wood grain lines on blade -->
  <line x1="30" y1="12" x2="30" y2="38" stroke="#6B5344" stroke-width="0.5" opacity="0.5"/>
  <line x1="34" y1="12" x2="34" y2="38" stroke="#6B5344" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Highlights to show it's toy-like -->
  <rect x="29" y="10" width="2" height="28" fill="#A0826D" opacity="0.3"/>
</svg>
