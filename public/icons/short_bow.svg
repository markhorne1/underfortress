<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bow curve -->
  <path d="M 15 10 Q 32 8, 49 10" stroke="#8B4513" stroke-width="3" fill="none"/>
  <path d="M 15 10 Q 32 12, 49 10" stroke="#654321" stroke-width="1" fill="none"/>
  
  <!-- Bow limbs -->
  <line x1="15" y1="10" x2="12" y2="54" stroke="#8B4513" stroke-width="2.5"/>
  <line x1="49" y1="10" x2="52" y2="54" stroke="#8B4513" stroke-width="2.5"/>
  
  <!-- String -->
  <line x1="12" y1="54" x2="52" y2="54" stroke="#DDD" stroke-width="1.5"/>
  
  <!-- Grip/handle -->
  <rect x="30" y="28" width="4" height="16" rx="2" fill="#654321"/>
  <rect x="28" y="32" width="8" height="8" rx="2" fill="#8B4513"/>
  
  <!-- Decorative notches on bow -->
  <line x1="20" y1="15" x2="20" y2="18" stroke="#654321" stroke-width="1"/>
  <line x1="44" y1="15" x2="44" y2="18" stroke="#654321" stroke-width="1"/>
  <line x1="32" y1="12" x2="32" y2="15" stroke="#654321" stroke-width="1"/>
</svg>
