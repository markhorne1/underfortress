<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer rim of shield -->
  <circle cx="32" cy="32" r="24" fill="#8B6F47" stroke="#5D4E37" stroke-width="2"/>
  
  <!-- Inner shield face -->
  <circle cx="32" cy="32" r="20" fill="#A0826D" stroke="#6B5344" stroke-width="1.5"/>
  
  <!-- Wood grain circles -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#6B5344" stroke-width="0.5" opacity="0.3"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#6B5344" stroke-width="0.5" opacity="0.3"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#6B5344" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Center boss (metal reinforcement) -->
  <circle cx="32" cy="32" r="4" fill="#7A7A7A" stroke="#4A4A4A" stroke-width="1"/>
  
  <!-- Highlight to show roundness -->
  <ellipse cx="28" cy="28" rx="8" ry="12" fill="#C4A57B" opacity="0.3"/>
  
  <!-- Wooden planks effect -->
  <path d="M 20 32 Q 32 30 44 32" stroke="#5D4E37" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M 32 20 Q 30 32 32 44" stroke="#5D4E37" stroke-width="0.5" fill="none" opacity="0.4"/>
</svg>
